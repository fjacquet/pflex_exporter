services:
  pflex_exporter:
    build: .
    image: pflex_exporter
    container_name: pflex_exporter
    ports:
      - "2112:2112"
    volumes:
      - ./config.yaml:/etc/pflex_exporter/config.yaml:ro
    environment:
      # Provide cluster secrets via the environment (referenced as ${FLEX1_PASSWORD}).
      - FLEX1_PASSWORD=${FLEX1_PASSWORD:-}
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: pflex_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - pflex_exporter

  # Optional: receives the OTLP metric push when opentelemetry.metrics is enabled.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: pflex_otel_collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "8889:8889" # collector-exposed Prometheus metrics
