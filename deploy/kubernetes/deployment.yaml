apiVersion: apps/v1
kind: Deployment
metadata:
  name: pflex-exporter
  labels:
    app.kubernetes.io/name: pflex-exporter
spec:
  # Singleton collector: a second replica would double-poll every cluster
  # (no leader election). Recreate avoids two pods overlapping on rollout.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: pflex-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pflex-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pflex-exporter
          image: ghcr.io/fjacquet/pflex_exporter:0.3.0
          args: ["--config", "/etc/pflex_exporter/config.yaml"]
          ports:
            - name: metrics
              containerPort: 9445
          envFrom:
            - secretRef:
                name: pflex-exporter-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            # /metrics reflects process health (always 200 while serving).
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            # /health is 503 until at least one cluster is collected.
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 15
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /etc/pflex_exporter
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: pflex-exporter-config
        - name: tmp
          emptyDir: {}
