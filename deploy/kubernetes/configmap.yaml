apiVersion: v1
kind: ConfigMap
metadata:
  name: pflex-exporter-config
  labels:
    app.kubernetes.io/name: pflex-exporter
data:
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: "9445"
      uri: "/metrics"
      logName: "" # empty -> stdout, captured by the pod logs
    collection:
      interval: "10s"
      timeout: "8s"
    opentelemetry:
      metrics:
        enabled: false
        endpoint: "otel-collector:4317"
        insecure: true
        interval: "10s"
      tracing:
        enabled: false
        endpoint: "otel-collector:4317"
        insecure: true
        samplingRate: 0.1
    clusters:
      - name: flex-cluster1
        gateway: <gateway-ip-or-host>
        username: <monitor-user>
        password: "${PFLEX1_PASSWORD}"
        insecureSkipVerify: true
