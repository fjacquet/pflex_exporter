name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  binaries:
    name: Build binaries + SBOM
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release and upload assets
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # tags needed for `git describe` version
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Install tooling
        run: make tools
      - name: Build cross-platform binaries, SBOM and checksums
        run: make release
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pflex_exporter_*
            dist/checksums.txt
            dist/sbom.cdx.json
          generate_release_notes: true

  image:
    name: Build & push container image (+ SBOM attestation)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # provenance/SBOM attestations
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push (multi-arch, with SBOM + provenance)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
