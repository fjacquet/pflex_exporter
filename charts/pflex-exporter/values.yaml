replicaCount: 1

image:
  repository: ghcr.io/fjacquet/pflex_exporter
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 9445

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
readinessProbe:
  httpGet:
    path: /health
    port: http

volumes: []
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

extraArgs: []

existingSecret: ""

# Inline exporter config, rendered into a Secret as config.yaml and mounted at
# /etc/pflex_exporter/config.yaml. Add or override any config here, including
# the optional opentelemetry: / kubernetes: blocks. See config.yaml in the repo.
config: |
  server:
    host: "0.0.0.0"
    port: "9445"
    uri: "/metrics"
    logName: ""

  collection:
    interval: "10s"
    timeout: "8s"
    maxConcurrentClusters: 0
    slowResourceEveryN: 1
    slowResourceTypes: []

  kubernetes:
    enabled: false
    refreshInterval: "60s"
    csiDriverName: "csi-vxflexos.dellemc.com"

  opentelemetry:
    metrics:
      enabled: false
      endpoint: "localhost:4317"
      insecure: true
      interval: "10s"
    tracing:
      enabled: false
      endpoint: "localhost:4317"
      insecure: true
      samplingRate: 0.1

  clusters:
    - name: flex-cluster1
      gateway: "PFLEX_GATEWAY"
      username: "PFLEX_USERNAME"
      password: "PFLEX_PASSWORD"
      insecureSkipVerify: true

env: []
# - name: PFLEX1_GATEWAY
#   value: "10.0.0.1"
# - name: PFLEX1_USERNAME
#   valueFrom:
#     secretKeyRef:
#       name: my-pflex-secret
#       key: username

deploymentAnnotations: {}

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "9445"

prometheus:
  monitor:
    enabled: false
    additionalLabels: {}
    interval: 15s
    namespace: []
    metricRelabelings: []
    relabelings: []
    targetLabels: []

  rules:
    enabled: false
    additionalLabels: {}
    namespace: ""
    additionalRules: []

  scrapeConfig:
    enabled: false
    additionalLabels: {}
    namespace: ""
    interval: 60s
    scrapeTimeout: 55s
    metricRelabelings: []
    relabelings: []
